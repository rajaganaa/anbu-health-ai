name: AI App CI/CD

on:
    push:
        branches: ["master"] # Runs every time you push to the master branch
    pull_request:
        branches: ["master"]

jobs:
    test-and-lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Syntax Check (Lint)
              run: |
                  # This checks if your code has any "red lines" or syntax errors
                  python -m compileall .
